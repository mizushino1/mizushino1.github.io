<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Badge Component</title>
</head>

<body>

  <!--
  =====================================================================
  SKILL CIRCLE BADGE — Usage Instructions
  =====================================================================

  HOW TO ADD A SKILL BADGE:
  Copy one <div class="skill-circle"> block and paste it inside
  the <div class="skill-wrap"> container.

  HOW TO CHANGE THE PROGRESS:
  Find:   data-progress="75"
  Change: data-progress="90"   ← any value from 0 to 100

  HOW TO CHANGE THE COLOR:
  Find:   data-color="#7F77DD"
  Change: data-color="#1D9E75"  ← any valid hex color

  EXAMPLE — A full green JavaScript badge at 90%:
  <div class="skill-circle" data-progress="90" data-color="#1D9E75">
    <span class="skill-name">JavaScript</span>
  </div>

  =====================================================================
  -->

  <div class="row g-3 justify-content-center">
    <div class="col-auto">

      <!-- ↓↓ COPY & PASTE MORE OF THESE ↓↓ -->

      <div class="skill-circle" data-progress="90" data-color="#7F77DD">
        <span class="skill-name">JavaScript</span>
      </div>

      <div class="skill-circle" data-progress="75" data-color="#1D9E75">
        <span class="skill-name">Bootstrap</span>
      </div>

      <div class="skill-circle" data-progress="60" data-color="#378ADD">
        <span class="skill-name">SQL</span>
      </div>

      <div class="skill-circle" data-progress="50" data-color="#D85A30">
        <span class="skill-name">Networking</span>
      </div>

      <!-- ↑↑ COPY & PASTE MORE OF THESE ↑↑ -->
    </div>
  </div>

  <style>
    .skill-circle svg {
      display: block;
    }
  </style>

  <script>
    /*
    =====================================================================
    TO CHANGE CIRCLE SIZE:
    Increase or decrease the SIZE variable (default: 140).
    Everything else scales automatically.
    =====================================================================
    */
    const SIZE = 140;
    const STROKE = 8;
    const CX = SIZE / 2;
    const CY = SIZE / 2;
    const R = (SIZE / 2) - (STROKE / 2) - 10;
    const CIRCUM = 2 * Math.PI * R;

    function renderBadges() {
      const isDark = document.body.getAttribute('data-bs-theme') === 'dark';
      const fillColor = isDark ? '#2c2c2a' : '#f1efe8';
      const textColor = isDark ? '#ffffff' : '#2c2c2a';

      document.querySelectorAll('.skill-circle').forEach(el => {
        const pct = Math.min(100, Math.max(0, parseInt(el.dataset.progress) || 0));
        const color = el.dataset.color || '#7F77DD';
        const name = el.querySelector('.skill-name').textContent.trim();

        el.querySelector('.skill-name').style.display = 'none';

        const dash = (pct / 100) * CIRCUM;
        const gap = CIRCUM - dash;

        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', SIZE);
        svg.setAttribute('height', SIZE);
        svg.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);
        svg.setAttribute('role', 'img');
        svg.setAttribute('aria-label', `${name} — ${pct}%`);

        svg.innerHTML = `
            <circle cx="${CX}" cy="${CY}" r="${R + STROKE / 2 + 4}"
                fill="${fillColor}" stroke="${fillColor}" stroke-width="1.5"/>
            <circle cx="${CX}" cy="${CY}" r="${R}"
                fill="none" stroke="${color}" stroke-width="${STROKE + 6}" opacity="0.25"/>
            <circle cx="${CX}" cy="${CY}" r="${R}"
                fill="none" stroke="${color}" stroke-width="${STROKE}"
                stroke-dasharray="${dash} ${gap}"
                stroke-dashoffset="${CIRCUM / 4}"
                stroke-linecap="round"/>
            <text x="${CX}" y="${CY - 7}" text-anchor="middle"
                font-size="11" font-weight="500" font-family="inherit"
                fill="${textColor}">${name}</text>
            <text x="${CX}" y="${CY + 13}" text-anchor="middle"
                font-size="18" font-weight="700" font-family="inherit"
                fill="${textColor}">${pct}%</text>
        `;

        el.insertBefore(svg, el.firstChild);
      });
    }

    renderBadges();

    const observer = new MutationObserver(() => {
      document.querySelectorAll('.skill-circle svg').forEach(svg => svg.remove());
      document.querySelectorAll('.skill-circle').forEach(el => {
        el.querySelector('.skill-name').style.display = '';
      });
      renderBadges();
    });

    observer.observe(document.body, { attributes: true, attributeFilter: ['data-bs-theme'] });
  </script>

</body>

</html>
