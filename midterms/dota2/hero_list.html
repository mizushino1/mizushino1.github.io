<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DOTA 2 Tracker</title>
    <link rel="icon" type="image/png" href="./assets/image/Menu Icon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="./assets/css/glass.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Gentium+Book+Basic:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="./assets/css/font.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>

<body class="">
    <nav class="navbar navbar-expand-lg bg-dark glass-card-red border-bottom border-body sticky-top"
        data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand mx-5" href="#">
                <img src="./assets/image/Menu Icon.svg" alt="Bootstrap" width="50" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="overview.html">Overview</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Heroes</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Player Friend Code"
                        aria-label="friendCode" id="searchPlayerCode">
                    <button class="btn btn-outline-danger" onclick="getPlayerData()">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-lg-3 justify-content-center d-flex">
                <div class="card glass-card-red mt-5 glass-card ms-4 w-75 align-self-start">
                    <div class="card-header cinzel text-center text-light">
                        <p class="p-2 bg-dark rounded-4 border border-black shadow">DOTA 2 HERO LIST </p>
                    </div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item ">
                            <div class="text-light text-center gentium fs-5">SEARCH HERO</div>
                            <div class="input-group mb-3 mt-4">
                                <div class="form-floating">
                                    <input type="text" id="heroSearchInput"
                                        class="form-control bg-dark radiance fw-bold text-light"
                                        placeholder="Type hero name" list="heroList"
                                        style="font-size: 12px; text-align: left; display: flex; align-items: center; padding-top: 0 !important;padding-bottom: 0 !important;line-height: 40px; height: 40px;">
                                    <label for="heroSearchInput" class="radiance" style="font-size: 13px;">Type hero
                                        name</label>
                                </div>
                                <datalist id="heroList">
                                </datalist>
                                <button class="btn btn-outline-danger radiance searchBtnHero fw-bold d-none" type="button"
                                    id="">Search</button>
                            </div>
                        </li>
                        <li class="list-group-item">
                            <div class="text-light text-center gentium fs-5 mb-4">FILTER BY ATTRIBUTE</div>
                            <div class="text-center">
                                <select class="form-select bg-dark text-light text-center radiance" id="attrFilter">
                                    <option value="">ALL</option>
                                    <option value="str" style="color: rgb(185, 80, 11)">STRENGTH</option>
                                    <option value="agi" style="color: rgb(22, 124, 19)">AGILITY</option>
                                    <option value="int" style="color: rgb(37, 125, 174)">INTELLIGENCE</option>
                                    <option value="all" style="color: rgb(140, 0, 255)">UNIVERSAL</option>
                                </select>
                            </div>
                        </li>
                        <li class="list-group-item text-center"> <button class="btn btn-dark gentium fs-5 searchBtnHero fw-bold"
                                type="button" id="">SEARCH</button></li>
                    </ul>
                </div>


            </div>
            <div class="col-12 col-lg-8 mt-5 me-2 glass-card">
                <div class="row justify-content-center" id="heroListContainer">

                </div>

            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./assets/javascript/findPlayer.js"></script>
    <script src="./assets/javascript/generateHeroList.js"></script>

</body>

</html>
