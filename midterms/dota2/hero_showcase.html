<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DOTA 2 Tracker</title>
    <link rel="icon" type="image/png" href="./assets/image/Menu Icon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="./assets/css/glass.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Gentium+Book+Basic:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link href="./assets/css/font.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>

<body class="">
    <nav class="navbar navbar-expand-lg bg-dark glass-card-red border-bottom border-body sticky-top"
        data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand mx-5" href="#">
                <img src="./assets/image/Menu Icon.svg" alt="Bootstrap" width="50" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="overview.html">Overview</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="hero_list.html">Heroes</a>
                    </li>
                    
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Player Friend Code"
                        aria-label="friendCode" id="searchPlayerCode">
                    <button class="btn btn-outline-danger" onclick="getPlayerData(event)">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-lg-5 col-xl-4 mt-5">
                <div id="heroDataSpinner" class="card glass-card align-items-center w-75 w-lg-100 w-xl-75 mx-auto py-5" style="min-height: 400px;">
                    <div class="spinner-border text-danger mb-3" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="text-secondary radiance" style="letter-spacing: 2px;">LOADING HERO DATA...</p>
                </div>
                <div class="card glass-card mx-auto w-75 w-lg-100 w-xl-75" style="width: 75%; display: none;" id="heroProfile">
                    <img src="" class="card-img-top" alt="Hero Image" id="currentHeroImage">

                    <div class="card-body">
                        <h5 class="card-title text-center hero-name-font text-light" id="currentHeroName"></h5>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item grey fw-bold radiance text-center " id="attributePrimary">

                        </li>
                        <li class="list-group-item grey fw-bold radiance text-center " id="heroRoles">

                        </li>
                        <li class="list-group-item">
                            <div class="container-fluid">
                                <div class="row" id="heroStats">

                                </div>
                            </div>
                        </li>
                        <li class="list-group-item">
                            <div class="container-fluid mt-2">
                                <div class="row">
                                    <div class="col">
                                        <div class="input-group mb-3">
                                            <div class="form-floating">
                                                <input type="text" id="heroSearchInput"
                                                    class="form-control glass-card radiance fw-bold text-light"
                                                    placeholder="Type hero name" list="heroList"
                                                    style="font-size: 12px; text-align: left; display: flex; align-items: center; padding-top: 0 !important;padding-bottom: 0 !important;line-height: 40px; height: 40px;">
                                                <label for="heroSearchInput" class="radiance"
                                                    style="font-size: 13px;">Type hero name</label>
                                            </div>
                                            <datalist id="heroList">
                                            </datalist>
                                            <button class="btn btn-outline-danger radiance fw-bold" type="button"
                                                id="searchBtn">Search</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </li>

                    </ul>
                </div>


            </div>

            <div class="col-12 col-lg-7 col-xl-7 mt-5 glass-card p-0">
                <div class="row">
                    <div class="col-12 col-lg-6">
                        <div class="h3 text-light cinzel fw-bold glass-card-red p-3 text-center"
                            style="border-radius: 0 0 20px 0">
                            HERO SKILL LIST
                        </div>
                    </div>
                </div>
                <div class="row ms-4 mt-3">
                    <div class="col-12 " id="skillContainer">

                    </div>

                </div>


            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./assets/javascript/findPlayer.js"></script>
    <script src="./assets/javascript/findHero.js"></script>
    <script src="./assets/javascript/index.js"></script>

</body>

</html>
